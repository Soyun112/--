<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#fff6d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="엄마·아빠가 보낸 안전한 길 안내">
  <meta property="og:type" content="website">
  <meta property="og:title" content="👶 오늘의 안전 길">
  <meta property="og:description" content="링크를 누르면 아이용 길 안내 카드가 바로 열려요!">
  <title>👶 오늘의 안전 길</title>
  <link rel="stylesheet" href="kid-guide.css">
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="kid-guide-share.js"></script>
  <script>
    (function preloadGuide() {
      var inline = typeof readInlineGuidePayload === "function" ? readInlineGuidePayload() : null;
      if (inline && inline.steps && inline.steps.length) {
        window.__KID_GUIDE_PRELOAD__ = inline;
        document.documentElement.classList.add("has-preload");
      }
    })();
  </script>
</head>
<body class="kid-guide-page">
  <div id="kid-guide-loading" class="kid-guide-loading">
    <div class="kid-guide-status-card">
      <span class="kid-guide-status-emoji" aria-hidden="true">🧒🛡️</span>
      <p class="kid-guide-status-title">안전 길 안내 여는 중</p>
      <p class="kid-guide-status-sub">잠시만 기다려 주세요…</p>
      <div class="kid-guide-spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div id="kid-guide-error" class="kid-guide-error" hidden>
    <div class="kid-guide-status-card is-error">
      <span class="kid-guide-status-emoji" aria-hidden="true">😢</span>
      <p class="kid-guide-status-title">길 안내를 열 수 없어요</p>
      <p id="kid-guide-error-text" class="kid-guide-status-sub">링크를 찾을 수 없어요.</p>
    </div>
  </div>

  <div id="kid-guide-app" class="kid-guide-shell" hidden>
    <header class="kid-guide-header">
      <p class="kid-guide-badge">🛡️ 엄마·아빠가 보낸 안전 길</p>
      <h1 id="kid-guide-title" class="kid-guide-title">오늘의 안전 길</h1>
      <p id="kid-guide-meta" class="kid-guide-meta" hidden></p>
      <p id="kid-guide-step-count" class="kid-guide-step-count">1 / 1</p>
    </header>

    <div id="kid-guide-story-bar" class="kid-guide-story-bar" aria-hidden="true"></div>

    <main id="kid-guide-card" class="kid-guide-card-full">
      <div id="kid-guide-tap-prev" class="kid-guide-tap-left" aria-label="이전"></div>
      <div id="kid-guide-tap-next" class="kid-guide-tap-right" aria-label="다음"></div>
      <div id="kid-guide-stage" class="kid-guide-stage">
        <div id="kid-guide-icon" class="kid-guide-icon" aria-hidden="true">↑</div>
        <h2 id="kid-guide-text" class="kid-guide-keyword">직진</h2>
        <p id="kid-guide-friendly" class="kid-guide-friendly"></p>
        <p id="kid-guide-landmark" class="kid-guide-landmark"></p>
      </div>
    </main>

    <div class="kid-guide-nav" id="kid-guide-nav">
      <button type="button" id="kid-guide-prev" class="kid-guide-nav-btn ghost" hidden aria-label="이전">←</button>
      <button type="button" id="kid-guide-next-btn" class="kid-guide-nav-btn primary">다음 →</button>
    </div>

    <footer class="kid-guide-footer">
      <p>천천히 걸어요 · 횡단보도는 신호 확인 🚸</p>
    </footer>
  </div>

  <script src="kid-guide.js"></script>
</body>
</html>
