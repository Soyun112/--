<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff6d8">
  <title>오늘의 안전 길</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="kid-guide-page">
  <div id="kid-guide-loading" class="kid-guide-loading">길 안내를 불러오는 중…</div>

  <div id="kid-guide-error" class="kid-guide-error" hidden>
    <p id="kid-guide-error-text">링크를 찾을 수 없어요.</p>
  </div>

  <div id="kid-guide-app" class="kid-guide-app" hidden>
    <header class="kid-guide-header">
      <p class="kid-guide-badge">👶 아이용 길 안내</p>
      <h1 id="kid-guide-title">오늘의 안전 길</h1>
      <p id="kid-guide-meta" class="kid-guide-meta"></p>
    </header>

    <div id="kid-guide-card" class="kid-card kid-guide-card">
      <div id="kid-guide-progress" class="kid-card-progress">1 / 1</div>
      <div id="kid-guide-stage" class="kid-card-stage">
        <div id="kid-guide-icon" class="kid-card-icon" aria-hidden="true">↑</div>
        <div id="kid-guide-text" class="kid-card-text">직진</div>
        <div id="kid-guide-friendly" class="kid-card-friendly"></div>
        <div id="kid-guide-distance" class="kid-card-distance"></div>
        <div id="kid-guide-landmark" class="kid-card-landmark"></div>
      </div>
      <div class="kid-card-nav">
        <button type="button" id="kid-guide-prev" class="kid-card-nav-btn">← 이전</button>
        <button type="button" id="kid-guide-next" class="kid-card-nav-btn primary">다음 →</button>
      </div>
    </div>

    <p class="kid-guide-footer">엄마·아빠가 보낸 안전한 길이에요. 천천히 따라가요!</p>
  </div>

  <script src="kid-guide-share.js"></script>
  <script src="kid-guide.js"></script>
</body>
</html>
