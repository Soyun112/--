<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#fff6d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="엄마·아빠가 보낸 안전한 길 안내. 링크를 누르면 바로 카드로 볼 수 있어요.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="👶 오늘의 안전 길">
  <meta property="og:description" content="링크를 누르면 아이용 길 안내 카드가 바로 열려요!">
  <title>👶 오늘의 안전 길</title>
  <link rel="stylesheet" href="kid-guide.css">
  <script src="kid-guide-share.js"></script>
  <script>
    (function preloadGuide() {
      var params = new URLSearchParams(window.location.search);
      var inline = decodeKidGuidePayload(params.get("d"));
      if (inline && inline.steps && inline.steps.length) {
        window.__KID_GUIDE_PRELOAD__ = inline;
        document.documentElement.classList.add("has-preload");
      }
    })();
  </script>
</head>
<body class="kid-guide-page">
  <div id="kid-guide-loading" class="kid-guide-loading">길 안내를 여는 중…</div>

  <div id="kid-guide-error" class="kid-guide-error" hidden>
    <p id="kid-guide-error-text">링크를 찾을 수 없어요.</p>
  </div>

  <div id="kid-guide-app" class="kid-guide-shell" hidden>
    <header class="kid-guide-top">
      <p class="kid-guide-badge">👶 아이용 길 안내</p>
      <div id="kid-guide-story-bar" class="kid-guide-story-bar" aria-hidden="true"></div>
      <p id="kid-guide-route" class="kid-guide-route">오늘의 안전 길</p>
      <p id="kid-guide-meta" class="kid-guide-meta-line"></p>
    </header>

    <main id="kid-guide-card" class="kid-guide-card-full">
      <div id="kid-guide-tap-prev" class="kid-guide-tap-left" aria-hidden="true"></div>
      <div id="kid-guide-tap-next" class="kid-guide-tap-right" aria-hidden="true"></div>
      <div id="kid-guide-stage" class="kid-guide-stage">
        <div id="kid-guide-icon" class="kid-guide-icon" aria-hidden="true">↑</div>
        <h1 id="kid-guide-text" class="kid-guide-keyword">직진</h1>
        <p id="kid-guide-friendly" class="kid-guide-friendly"></p>
        <p id="kid-guide-landmark" class="kid-guide-landmark"></p>
      </div>
    </main>

    <footer class="kid-guide-bottom">
      <button type="button" id="kid-guide-next-btn" class="kid-guide-next-btn">다음 →</button>
      <p class="kid-guide-hint">화면 왼쪽·오른쪽을 눌러도 넘길 수 있어요</p>
    </footer>
  </div>

  <script src="kid-guide.js"></script>
</body>
</html>
