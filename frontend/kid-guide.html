<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#fff6d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="링크를 누르면 길 안내 카드가 바로 열려요!">
  <meta property="og:type" content="website">
  <meta property="og:title" id="og-title" content="👶 오늘의 안전 길">
  <meta property="og:description" id="og-description" content="링크를 누르면 길 안내 카드가 바로 열려요!">
  <meta property="og:url" id="og-url" content="">
  <title id="page-title">👶 오늘의 안전 길</title>
  <script>
    (function normalizeGuideUrl() {
      try {
        var params = new URLSearchParams(location.search);
        if (params.has("d") || params.has("id") || params.has("p0")) return;
        var path = location.pathname.replace(/\/+$/, "") || "/";
        var match = path.match(/^\/g\/(.+)$/i);
        if (!match) return;
        history.replaceState(null, "", "/guide?d=" + encodeURIComponent(match[1]));
      } catch (e) { /* ignore */ }
    })();
  </script>
  <link rel="stylesheet" href="/kid-guide.css">
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="/kid-guide-share.js"></script>
  <script>
    (function preloadGuide() {
      var title = "👶 오늘의 안전 길";
      var description = "링크를 누르면 길 안내 카드가 바로 열려요!";
      try {
        var inline = typeof readInlineGuidePayload === "function" ? readInlineGuidePayload() : null;
        if (inline && inline.title) title = "👶 " + inline.title;
        if (inline && inline.steps && inline.steps.length) {
          window.__KID_GUIDE_PRELOAD__ = inline;
          document.documentElement.classList.add("has-preload");
        }
        function setMeta(id, value) {
          var el = document.getElementById(id);
          if (el) el.setAttribute("content", value);
        }
        setMeta("og-title", title);
        setMeta("og-description", description);
        setMeta("og-url", location.href);
        var pageTitle = document.getElementById("page-title");
        if (pageTitle) pageTitle.textContent = title;
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body class="kid-guide-page">
  <div id="kid-guide-loading" class="kid-guide-loading">길 안내를 여는 중…</div>

  <div id="kid-guide-error" class="kid-guide-error" hidden>
    <p id="kid-guide-error-text">링크를 찾을 수 없어요.</p>
  </div>

  <div id="kid-guide-app" class="kid-guide-shell" hidden>
    <div id="kid-guide-story-bar" class="kid-guide-story-bar" aria-hidden="true"></div>

    <div id="kid-guide-progress-stamps" class="kid-progress-stamps" aria-label="길 따라가기 스탬프">
      <div class="kid-progress-stamp" data-stamp="third"><span class="kid-progress-stamp-emoji">⭐</span><span class="kid-progress-stamp-label">1/3</span></div>
      <div class="kid-progress-stamp" data-stamp="twoThirds"><span class="kid-progress-stamp-emoji">🌟</span><span class="kid-progress-stamp-label">2/3</span></div>
      <div class="kid-progress-stamp arrive" data-stamp="arrive"><span class="kid-progress-stamp-emoji">👑</span><span class="kid-progress-stamp-label">도착</span></div>
    </div>
    <div id="kid-guide-cheer" class="kid-card-cheer" hidden role="status"></div>

    <main id="kid-guide-card" class="kid-guide-card-full">
      <div id="kid-guide-tap-prev" class="kid-guide-tap-left" aria-label="이전"></div>
      <div id="kid-guide-tap-next" class="kid-guide-tap-right" aria-label="다음"></div>
      <div id="kid-guide-stage" class="kid-guide-stage">
        <div id="kid-guide-icon" class="kid-guide-icon" aria-hidden="true">↑</div>
        <h1 id="kid-guide-text" class="kid-guide-keyword">직진</h1>
        <p id="kid-guide-friendly" class="kid-guide-friendly"></p>
        <p id="kid-guide-distance" class="kid-guide-distance"></p>
        <p id="kid-guide-landmark" class="kid-guide-landmark"></p>
      </div>
    </main>

    <button type="button" id="kid-guide-next-btn" class="kid-guide-next-btn">다음 →</button>
  </div>

  <script src="/kid-guide.js"></script>
</body>
</html>
